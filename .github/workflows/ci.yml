name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lint (ruff + mypy)
        run: make lint

      - name: Tests unitaires
        run: pytest tests/ -v -m "not integration and not slow" --ignore=tests/eval
        # Note: make eval (évaluation offline) nécessite OPENROUTER_API_KEY + DuckDB initialisé.
        # Lancer manuellement avec : make eval
        # Pour la régression : make eval-baseline (1 fois) puis make regression-check
